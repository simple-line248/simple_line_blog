name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支时触发部署（如果你的默认分支是 master，请修改此处）
  push:
    branches: [ main ]
  # 允许从 Actions 选项卡手动运行此工作流
  workflow_dispatch:

# 允许 job 克隆仓库并创建 page 部署
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # Astro Action 会自动探测你使用的包管理器 (npm/yarn/pnpm) 并进行构建

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4